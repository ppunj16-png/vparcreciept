name: Deploy to Netlify
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy zip to Netlify
        run: |
          zip deploy.zip index.html
          curl -s -X POST \
            "https://api.netlify.com/api/v1/sites/${{ secrets.NETLIFY_SITE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.NETLIFY_AUTH_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print('Deploy state:', d.get('state','?'))
          print('URL:', d.get('deploy_ssl_url') or d.get('ssl_url','?'))
          "
